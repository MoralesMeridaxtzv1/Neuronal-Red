<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conexiones Neuronales</title>

  <!-- Three.js r160 desde CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

 <style>
  @font-face {
    font-family: 'LEMONMILK';
    src: url('./LEMONMILK-Bold.otf') format('opentype');
    font-weight: bold;
    font-style: normal;
    font-display: swap;
  }

    /* ══════════════════════════════════════
       VARIABLES & RESET
    ══════════════════════════════════════ */
    :root {
      --bg:         #020408;
      --panel:      rgba(5,12,22,0.82);
      --border:     rgba(0,210,255,0.18);
      --accent:     #00d2ff;
      --accent2:    #7b2fff;
      --accent3:    #ff2d78;
      --text:       #c8e6f5;
      --text-dim:   #4a7a99;
      --glow:       0 0 24px rgba(0,210,255,0.35);
     --font-head: 'LEMONMILK', 'Impact', 'Arial Black', sans-serif;
     --font-body: 'LEMONMILK', 'Impact', 'Arial Black', sans-serif;
      --radius:     10px;
    }

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      user-select: none;
    }

    /* ══════════════════════════════════════
       CANVAS 3D (Three.js)
    ══════════════════════════════════════ */
    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ══════════════════════════════════════
       OVERLAY: SCANLINES + VIGNETTE
    ══════════════════════════════════════ */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.04) 2px,
          rgba(0,0,0,0.04) 4px
        ),
        radial-gradient(ellipse at center,
          transparent 40%,
          rgba(0,0,0,0.65) 100%
        );
    }

    /* ══════════════════════════════════════
       UI PANEL — TOP LEFT
    ══════════════════════════════════════ */
    #panel {
      position: fixed;
      top: 24px; left: 24px;
      width: 360px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Header */
    .panel-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 44px; height: 44px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: var(--glow), inset 0 0 16px rgba(0,210,255,0.15);
      animation: pulse-ring 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: var(--glow), inset 0 0 16px rgba(0,210,255,0.15); }
      50%       { box-shadow: 0 0 40px rgba(0,210,255,0.6), inset 0 0 28px rgba(0,210,255,0.25); }
    }

    .title-block h1 {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(0,210,255,0.6);
    }

    .title-block p {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1.5px;
      margin-top: 2px;
    }

    /* Card base */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      backdrop-filter: blur(16px);
    }

    /* Prompt input */
    .prompt-area label {
      display: block;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      background: rgba(0,210,255,0.05);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 12px;
      padding: 10px 12px;
      resize: none;
      height: 70px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      line-height: 1.6;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(0,210,255,0.25);
    }

    textarea::placeholder { color: var(--text-dim); opacity: 0.7; }

    /* API key toggle */
    .api-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .api-toggle input[type="checkbox"] { accent-color: var(--accent); }

    .api-toggle label {
      font-size: 10px;
      color: var(--text-dim);
      cursor: pointer;
    }

    #api-key-row {
      display: none;
      margin-top: 8px;
    }

    #api-key-row input {
      width: 100%;
      background: rgba(123,47,255,0.08);
      border: 1px solid rgba(123,47,255,0.3);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 11px;
      padding: 8px 10px;
      outline: none;
      transition: border-color .2s;
    }

    #api-key-row input:focus { border-color: var(--accent2); }

    /* Buttons */
    .btn-row { display: flex; gap: 8px; margin-top: 10px; }

    button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }

    #btn-generate {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 0 20px rgba(0,210,255,0.3);
    }

    #btn-generate:hover:not(:disabled) {
      box-shadow: 0 0 32px rgba(0,210,255,0.55);
      transform: translateY(-1px);
    }

    #btn-generate:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #btn-clear {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    #btn-clear:hover { color: var(--accent3); border-color: var(--accent3); }

    /* Status / output */
    #status-box {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-dim);
      min-height: 16px;
      transition: color .3s;
    }

    #status-box.active { color: var(--accent); }
    #status-box.error  { color: var(--accent3); }

    /* Generated text preview */
    #text-preview {
      font-size: 10px;
      line-height: 1.7;
      color: var(--text);
      max-height: 80px;
      overflow-y: auto;
      display: none;
      opacity: 0;
      transition: opacity .5s;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #text-preview.visible { display: block; opacity: 1; }

    /* Stats bar */
    #stats-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    #stats-bar.visible { display: flex; }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-value {
      font-family: var(--font-head);
      font-size: 18px;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0,210,255,0.5);
    }

    .stat-label {
      font-size: 8px;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .stat-divider {
      width: 1px;
      height: 30px;
      background: var(--border);
    }

    /* ══════════════════════════════════════
       KEYWORDS CLOUD — BOTTOM
    ══════════════════════════════════════ */
    #keywords-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 80vw;
      opacity: 0;
      transition: opacity .6s;
    }

    #keywords-panel.visible { opacity: 1; }

    .kw-tag {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: 1px solid;
      animation: kw-appear .5s ease-out both;
      cursor: default;
      transition: all .2s;
    }

    .kw-tag:hover {
      transform: translateY(-2px) scale(1.05);
      filter: brightness(1.3);
    }

    @keyframes kw-appear {
      from { opacity: 0; transform: translateY(10px) scale(0.85); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ══════════════════════════════════════
       CORNER DECORATIONS
    ══════════════════════════════════════ */
    .corner {
      position: fixed;
      z-index: 5;
      width: 60px; height: 60px;
      pointer-events: none;
    }

    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--accent);
      opacity: 0.4;
    }

    .corner-tr { top: 16px; right: 16px; }
    .corner-tr::before { width: 2px; height: 40px; right: 0; top: 0; }
    .corner-tr::after  { width: 40px; height: 2px; right: 0; top: 0; }

    .corner-bl { bottom: 16px; left: 16px; }
    .corner-bl::before { width: 2px; height: 40px; left: 0; bottom: 0; }
    .corner-bl::after  { width: 40px; height: 2px; left: 0; bottom: 0; }

    /* ══════════════════════════════════════
       MODE BADGE — TOP RIGHT
    ══════════════════════════════════════ */
    #mode-badge {
      position: fixed;
      top: 24px; right: 24px;
      z-index: 10;
      font-family: var(--font-head);
      font-size: 9px;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text-dim);
      text-transform: uppercase;
      backdrop-filter: blur(12px);
      transition: all .4s;
    }

    #mode-badge.live {
      color: var(--accent);
      border-color: rgba(0,210,255,0.4);
      box-shadow: 0 0 16px rgba(0,210,255,0.2);
    }

    /* Loading spinner overlay */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2,4,8,0.5);
      backdrop-filter: blur(4px);
    }

    #loader.visible { display: flex; }

    .loader-ring {
      width: 60px; height: 60px;
      border: 3px solid rgba(0,210,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- 3D Canvas -->
<div id="canvas-container"></div>

<!-- Scanlines + Vignette -->
<div id="overlay"></div>

<!-- Corner decorations -->
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>

<!-- Mode badge -->
<div id="mode-badge">● KASLEM </div>

<!-- Loading overlay -->
<div id="loader"><div class="loader-ring"></div></div>

<!-- ── UI Panel ───────────────────────── -->
<div id="panel">
  <!-- Header -->
  <div class="panel-header">
    <div class="logo-mark">🧠</div>
    <div class="title-block">
      <h1>Redes Neuronales 3D</h1>
      <p>3D KNOWLEDGE GRAPH ENGINE v2.0</p>
    </div>
  </div>

  <!-- Prompt card -->
  <div class="card prompt-area">
    <label>→ Ingresa tu prompt</label>
    <textarea id="prompt-input"
      placeholder="Ej: inteligencia artificial y redes neuronales..."
      maxlength="5000"
    ></textarea>

    <div class="api-toggle">
      <input type="checkbox" id="use-openai" />
      <label for="use-openai">Usar OpenAI GPT-4o-mini (requiere API key)</label>
    </div>

    <div id="api-key-row">
      <input type="password" id="api-key-input" placeholder="sk-..." />
    </div>

    <div class="btn-row">
      <button id="btn-generate"> Generar</button>
      <button id="btn-clear">✕ Limpiar</button>
    </div>

    <div id="status-box">LISTO · Introduce un prompt para comenzar</div>
  </div>

  <!-- Stats card -->
  <div class="card" id="stats-bar">
    <div class="stat">
      <span class="stat-value" id="stat-nodes">0</span>
      <span class="stat-label">Nodos</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value" id="stat-edges">0</span>
      <span class="stat-label">Conexiones</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value" id="stat-particles">0</span>
      <span class="stat-label">Partículas</span>
    </div>
  </div>

  <!-- Text preview card -->
  <div class="card" id="text-preview"></div>
</div>

<!-- ── Keywords panel ───────────────── -->
<div id="keywords-panel"></div>

<!-- ══════════════════════════════════════
     MAIN SCRIPT
══════════════════════════════════════ -->
<script src="script.js"></script>
</body>
</html>
